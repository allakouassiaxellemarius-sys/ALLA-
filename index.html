<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Action ou Vérité – Groupe WhatsApp</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0f0c29;
  --bg2:#302b63;
  --surface:rgba(255,255,255,0.07);
  --surface2:rgba(255,255,255,0.12);
  --border:rgba(255,255,255,0.1);
  --text:#fff;
  --dim:#888;
  --gold:#ffd200;
  --truth:#7c3aed;
  --truth-l:#a78bfa;
  --dare:#ec4899;
  --dare-l:#f472b6;
  --whatsapp:#25D366;
  --radius:16px;
  --sm:10px;
  --t:.3s cubic-bezier(.4,0,.2,1)
}
html,body{height:100%;overflow:hidden}
body{
  font-family:-apple-system,system-ui,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
  background:linear-gradient(160deg,var(--bg),var(--bg2));
  color:var(--text);
  display:flex;
  justify-content:center;
  align-items:center;
  padding:12px
}
.app{
  width:100%;max-width:430px;height:95vh;max-height:800px;
  background:var(--surface);
  backdrop-filter:blur(24px);
  -webkit-backdrop-filter:blur(24px);
  border-radius:28px;
  border:1px solid var(--border);
  box-shadow:0 20px 60px rgba(0,0,0,.5);
  display:flex;flex-direction:column;
  overflow:hidden;
  position:relative
}

/* HEADER */
.header{
  text-align:center;padding:18px 16px 10px;flex-shrink:0
}
.logo{
  font-size:1.6rem;font-weight:900;letter-spacing:-.5px;
  background:linear-gradient(135deg,var(--gold),var(--dare));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;background-clip:text
}
.logo span{color:var(--dim);-webkit-text-fill-color:var(--dim)}
.tagline{font-size:.75rem;color:var(--dim);margin-top:2px}

/* SCREENS */
.screen{display:none;flex-direction:column;flex:1;overflow:hidden;padding:0 16px 16px}
.screen.active{display:flex}
.screen-scroll{flex:1;overflow-y:auto;padding:4px 0;-webkit-overflow-scrolling:touch}
.screen-scroll::-webkit-scrollbar{width:4px}
.screen-scroll::-webkit-scrollbar-thumb{background:var(--surface2);border-radius:4px}

/* HOME */
.input-row{display:flex;gap:8px;margin-bottom:4px}
.input-row input{
  flex:1;padding:12px 14px;border-radius:var(--sm);
  border:1px solid var(--border);background:rgba(255,255,255,.07);
  color:var(--text);font-size:.95rem;font-family:inherit;outline:none
}
.input-row input:focus{border-color:var(--gold)}
.input-row input::placeholder{color:#555}
.btn{
  padding:12px 18px;border:none;border-radius:var(--sm);
  font-family:inherit;font-weight:700;font-size:.9rem;cursor:pointer;
  transition:all var(--t);white-space:nowrap
}
.btn:active{transform:scale(.96)}
.btn-add{background:var(--gold);color:#000}
.btn-add:hover{filter:brightness(1.1)}

.chips{display:flex;flex-wrap:wrap;gap:6px;min-height:32px;margin:8px 0}
.chip{
  background:var(--surface2);padding:5px 12px;border-radius:16px;
  font-size:.8rem;display:flex;align-items:center;gap:5px;
  animation:pop .25s ease-out
}
.chip .rm{cursor:pointer;color:var(--dare-l);font-weight:700;font-size:.7rem;padding:0 2px}
@keyframes pop{0%{opacity:0;transform:scale(.8)}100%{opacity:1;transform:scale(1)}}

.lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--dim);font-weight:600;margin:10px 0 6px}
.pills{display:flex;gap:6px;flex-wrap:wrap}
.pill{
  padding:7px 16px;border-radius:20px;border:1px solid var(--border);
  background:transparent;color:var(--dim);font-family:inherit;font-size:.82rem;
  cursor:pointer;transition:all var(--t)
}
.pill.active{background:var(--gold);color:#000;border-color:var(--gold)}
.pill:hover{border-color:var(--gold);color:var(--text)}

.btn-start{
  width:100%;padding:16px;margin-top:14px;
  background:linear-gradient(135deg,var(--gold),var(--dare));
  color:#fff;font-size:1.1rem;font-weight:800;border:none;
  border-radius:var(--radius);cursor:pointer;transition:all var(--t);
  box-shadow:0 4px 20px rgba(236,72,153,.3)
}
.btn-start:hover{transform:translateY(-2px)}
.btn-start:disabled{opacity:.4;cursor:not-allowed;transform:none}
.err{color:var(--dare-l);font-size:.8rem;min-height:1.2em;margin:2px 0}

/* GAME */
.game-top{display:flex;justify-content:space-between;align-items:center;padding:4px 0 8px;flex-shrink:0}
.game-top button{
  background:var(--surface2);border:1px solid var(--border);color:var(--dim);
  padding:6px 12px;border-radius:8px;font-family:inherit;font-size:.75rem;cursor:pointer;transition:all var(--t)
}
.game-top button:hover{color:var(--text)}
.badge{
  font-size:.65rem;padding:4px 10px;border-radius:10px;
  background:var(--surface2);color:var(--dim);text-transform:uppercase;letter-spacing:1px;font-weight:600
}

.player-section{text-align:center;padding:6px 0 4px;flex-shrink:0}
.turn-lbl{font-size:.65rem;text-transform:uppercase;letter-spacing:2px;color:var(--dim)}
.player-name{
  font-size:2rem;font-weight:800;color:var(--gold);
  transition:color var(--t);min-height:2.6rem
}
.round-info{font-size:.75rem;color:var(--dim);margin-bottom:4px}

/* CHOICE BTNS */
.choices{display:flex;gap:10px;padding:6px 0;flex-shrink:0}
.choice{
  flex:1;padding:18px;border:none;border-radius:var(--radius);
  font-family:inherit;font-size:1.1rem;font-weight:800;cursor:pointer;
  transition:all var(--t);color:#fff;letter-spacing:.5px
}
.choice:active{transform:scale(.95)}
.choice:disabled{opacity:.25;cursor:not-allowed;transform:none}
.choice-t{background:linear-gradient(135deg,var(--truth),var(--truth-l));box-shadow:0 4px 16px rgba(124,58,237,.3)}
.choice-d{background:linear-gradient(135deg,var(--dare),var(--dare-l));box-shadow:0 4px 16px rgba(236,72,153,.3)}

/* CARD */
.card{
  flex:1;min-height:0;
  background:rgba(0,0,0,.2);border-radius:var(--radius);
  border:1px solid var(--border);padding:20px 18px;
  display:flex;flex-direction:column;justify-content:center;align-items:center;
  text-align:center;position:relative;margin:6px 0;overflow-y:auto
}
.card-label{font-size:.65rem;text-transform:uppercase;letter-spacing:3px;opacity:.4;font-weight:600;margin-bottom:6px}
.card-text{font-size:1.1rem;line-height:1.5;font-weight:500}
.card-text.empty{opacity:.35;font-style:italic;font-size:.95rem}
.card-text.t{color:var(--truth-l)}
.card-text.d{color:var(--dare-l)}
.card.pop{animation:cardPop .4s cubic-bezier(.34,1.56,.64,1)}
@keyframes cardPop{0%{opacity:0;transform:scale(.85)}50%{transform:scale(1.02)}100%{opacity:1;transform:scale(1)}}

/* ANSWER */
.ans-area{width:100%;margin-top:10px;display:flex;gap:6px;animation:fadeIn .3s}
.ans-area input{
  flex:1;padding:9px 12px;border-radius:var(--sm);
  border:1px solid var(--border);background:rgba(255,255,255,.07);
  color:var(--text);font-size:.85rem;font-family:inherit;outline:none
}
.ans-area input:focus{border-color:var(--gold)}
.btn-ans{padding:9px 14px;background:var(--gold);color:#000;border:none;border-radius:var(--sm);font-weight:700;font-size:.82rem;cursor:pointer}
.ans-show{width:100%;margin-top:8px;padding:8px 12px;border-radius:var(--sm);background:rgba(255,255,255,.05);border:1px solid var(--border);text-align:left;animation:fadeIn .3s}
.ans-show .l{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--dim)}
.ans-show .v{color:var(--gold);font-weight:500;font-size:.9rem}
@keyframes fadeIn{0%{opacity:0;transform:translateY(8px)}100%{opacity:1;transform:translateY(0)}}
.hide{display:none!important}

/* SHARE BAR */
.share-bar{
  display:flex;gap:8px;padding:6px 0 4px;flex-shrink:0;
  animation:fadeIn .3s
}
.share-bar.hide{display:none}
.share-btn{
  flex:1;padding:12px;border:none;border-radius:var(--sm);
  font-family:inherit;font-weight:700;font-size:.85rem;cursor:pointer;
  transition:all var(--t);display:flex;align-items:center;justify-content:center;gap:6px
}
.share-btn:active{transform:scale(.96)}
.share-btn.wa{background:var(--whatsapp);color:#fff}
.share-btn.wa:hover{filter:brightness(1.1)}
.share-btn.cp{background:var(--surface2);color:var(--dim);border:1px solid var(--border)}
.share-btn.cp:hover{color:var(--text)}

/* NEXT BAR */
.next-bar{display:flex;gap:8px;padding:4px 0;flex-shrink:0}
.next-bar.hide{display:none}
.next-btn{
  flex:1;padding:14px;border:none;border-radius:var(--sm);
  font-family:inherit;font-weight:700;font-size:.9rem;cursor:pointer;transition:all var(--t)
}
.next-btn:active{transform:scale(.96)}
.next-btn.nx{background:linear-gradient(135deg,#4facfe,#00f2fe);color:#fff}
.next-btn.qt{background:var(--surface2);color:var(--dim);border:1px solid var(--border)}
.next-btn.qt:hover{color:var(--text)}

/* HISTORY */
.hist{flex-shrink:0;border-top:1px solid var(--border);padding:8px 0 0;margin-top:2px}
.hist-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hist-h h3{font-size:.7rem;text-transform:uppercase;letter-spacing:1px;color:var(--dim)}
.hist-h button{background:none;border:none;color:var(--dare-l);font-size:.7rem;cursor:pointer;font-family:inherit}
.hist-items{max-height:70px;overflow-y:auto;display:flex;flex-direction:column;gap:3px}
.hist-item{font-size:.72rem;color:var(--dim);display:flex;gap:5px;padding:2px 0}
.hist-item .b{font-size:.55rem;padding:1px 6px;border-radius:4px;font-weight:700;flex-shrink:0}
.hist-item .b.t{background:rgba(124,58,237,.2);color:var(--truth-l)}
.hist-item .b.d{background:rgba(236,72,153,.2);color:var(--dare-l)}
.hist-item .p{color:var(--text);font-weight:600;flex-shrink:0}
.hist-item .t{flex:1}
.hist-item .a{color:var(--gold);font-size:.65rem;display:block}

/* OVERLAY */
.overlay{
  position:absolute;inset:0;background:rgba(0,0,0,.65);
  border-radius:28px;display:flex;flex-direction:column;
  justify-content:center;align-items:center;z-index:10;
  opacity:0;pointer-events:none;transition:opacity .3s
}
.overlay.active{opacity:1;pointer-events:auto}
.overlay .lbl{font-size:.8rem;margin-bottom:12px}
.track{width:70%;max-width:240px;height:8px;background:rgba(255,255,255,.1);border-radius:4px;overflow:hidden;margin-bottom:10px}
.fill{height:100%;width:0%;border-radius:4px;background:linear-gradient(90deg,var(--truth),var(--dare),var(--gold));transition:width .05s linear}
.cnt{font-size:2.5rem;font-weight:900;color:var(--gold);animation:pulse .5s ease-in-out}
@keyframes pulse{0%{transform:scale(1.2);opacity:.6}50%{transform:scale(.9)}100%{transform:scale(1);opacity:1}}

/* TOAST */
.toast{
  position:absolute;bottom:20px;left:50%;transform:translateX(-50%) translateY(60px);
  background:var(--surface);backdrop-filter:blur(16px);
  padding:10px 20px;border-radius:10px;border:1px solid var(--border);
  font-size:.8rem;opacity:0;transition:all .4s;pointer-events:none;z-index:20;white-space:nowrap
}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-height:640px){
  .app{height:100vh;max-height:none;border-radius:18px}
  .header{padding:12px 14px 6px}
  .logo{font-size:1.3rem}
  .player-name{font-size:1.5rem;min-height:2rem}
  .choice{padding:14px;font-size:1rem}
  .card{padding:14px 12px}
  .card-text{font-size:1rem}
}
</style>
</head>
<body>
<div class="app" id="app">
  <div class="toast" id="toast"></div>

  <!-- HEADER -->
  <div class="header">
    <div class="logo">ACTION <span>OU</span> VÉRITÉ</div>

        <button class="btn" style="flex:1;background:var(--surface2);color:var(--dim);border:1px solid var(--border);" id="btn-home-copy">🔗 Copier lien</button>
      </div>
    </div>
    <button class="btn-start" id="btn-start">🚀 Lancer la partie</button>
  </div>

  <!-- ===== GAME ===== -->

      <span class="badge" id="mode-badge">Fun</span>

    <div class="player-section">

    </div>

    <div class="choices" id="choices">
      <button class="choice choice-t" id="btn-t">☯ Vérité</button>
      <button class="choice choice-d" id="btn-d">⚡ Action</button>
    </div>

    <div class="card" id="card">
      <div style="position:relative;width:100%;height:100%;display:flex;flex-direction:column;justify-content:center;align-items:center;">
        <div class="card-label" id="card-label">Choisis Vérité ou Action</div>
        <div class="card-text empty" id="card-text">Appuie sur un bouton</div>

        <div class="ans-area hide" id="ans-area">
          <input type="text" id="ans-inp" placeholder="Ta réponse..." maxlength="100" autocomplete="off">
          <button class="btn-ans" id="btn-ans">💬</button>
        </div>
        <div class="ans-show hide" id="ans-show">
          <span class="l">Réponse :</span>
          <span class="v" id="ans-txt"></span>
        </div>

        <div class="overlay" id="overlay">
          <div class="lbl" id="ov-lbl">Prépare-toi...</div>
          <div class="track"><div class="fill" id="ov-fill"></div></div>
          <div class="cnt" id="ov-cnt">3</div>
        </div>
      </div>
    </div>

    <div class="share-bar hide" id="share-bar">
      <button class="share-btn wa" id="btn-share-wa">💬 WhatsApp</button>
      <button class="share-btn cp" id="btn-share-cp">📋 Copier</button>
    </div>

    <div class="next-bar hide" id="next-bar">
      <button class="next-btn nx" id="btn-next">Joueur suivant →</button>
      <button class="next-btn qt" id="btn-reset">↺</button>
    </div>

    <div class="hist" id="hist">
      <div class="hist-h">
        <h3>📜 Tours</h3>
        <button id="btn-clear-hist">Effacer</button>
      </div>
      <div class="hist-items" id="hist-list"></div>
    </div>
  </div>
</div>

const gameUrl = 'https://allakouassiaxellemarius-sys.github.io/ALLA-/';

// ===== STATE =====
const S = {
  players: [], idx: 0, mode: 'multi', cat: 'fun',
  usedT: [], usedD: [], lastT: null, lastD: null,
  history: [], started: false
};

// ===== DOM =====
const $ = id => document.getElementById(id);
const D = {
  toast: $('toast'), scHome: $('sc-home'), scGame: $('sc-game'),
  inpName: $('inp-name'), btnAdd: $('btn-add'), chips: $('chips'), errHome: $('err-home'),
  modePills: $('mode-pills'), catPills: $('cat-pills'),
  btnStart: $('btn-start'), btnHomeWa: $('btn-home-wa'), btnHomeCopy: $('btn-home-copy'),
  playerName: $('player-name'), roundInfo: $('round-info'), modeBadge: $('mode-badge'),
  btnT: $('btn-t'), btnD: $('btn-d'), card: $('card'),
  cardLabel: $('card-label'), cardText: $('card-text'),
  ansArea: $('ans-area'), ansInp: $('ans-inp'), btnAns: $('btn-ans'),
  ansShow: $('ans-show'), ansTxt: $('ans-txt'),
  shareBar: $('share-bar'), btnShareWa: $('btn-share-wa'), btnShareCp: $('btn-share-cp'),
  nextBar: $('next-bar'), btnNext: $('btn-next'), btnReset: $('btn-reset'),
  histList: $('hist-list'), btnClearHist: $('btn-clear-hist'),
  btnQuit: $('btn-quit'),
  overlay: $('overlay'), ovLbl: $('ov-lbl'), ovFill: $('ov-fill'), ovCnt: $('ov-cnt')
};

// ===== HELPERS =====
function esc(s){const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function toast(m){D.toast.textContent=m;D.toast.classList.add('show');setTimeout(()=>D.toast.classList.remove('show'),2000)}

function pick(cat,type){
  const pool = TR.fr[type][cat];
  if(!pool||!pool.length)return'…';
  const usedKey = type==='truth'?'usedT':'usedD';
  const lastKey = type==='truth'?'lastT':'lastD';
  let avail = pool.filter((_,i)=>!S[usedKey].includes(i)&&i!==S[lastKey]);
  if(!avail.length){S[usedKey]=[];avail = pool.filter((_,i)=>i!==S[lastKey]);if(!avail.length)avail=pool}
  let idx;do{idx=Math.floor(Math.random()*pool.length)}while(S[usedKey].includes(idx)||idx===S[lastKey]);
  S[usedKey].push(idx);S[lastKey]=idx;
  return pool[idx]
}

// ===== PLAYERS =====
function addPlayer(){
  const n = D.inpName.value.trim();
  D.errHome.textContent='';
  if(!n){D.errHome.textContent='Entre un prénom.';return}
  const nn = n.charAt(0).toUpperCase()+n.slice(1).toLowerCase();
  if(S.players.includes(nn)){D.errHome.textContent='Ce joueur existe déjà.';return}
  S.players.push(nn);renderChips();D.inpName.value='';D.inpName.focus();toast(`${nn} ajouté !`)
}
function removePlayer(i){S.players.splice(i,1);if(S.idx>=S.players.length)S.idx=0;renderChips()}
function renderChips(){
  D.chips.innerHTML=S.players.length
    ? S.players.map((p,i)=>`<span class="chip">${esc(p)} <span class="rm" data-i="${i}">✕</span></span>`).join('')
    : '<span style="color:var(--dim);font-size:.82rem;">Aucun joueur</span>';
  D.chips.querySelectorAll('.rm').forEach(el=>el.addEventListener('click',()=>removePlayer(parseInt(el.dataset.i))));
  updateStart()
}
function updateStart(){
  const ok = S.players.length>0;
  D.btnStart.disabled=!ok;
  D.btnStart.textContent=ok?`🚀 Lancer (${S.players.length})`:'🚀 Ajoute des joueurs'
}

// ===== GAME =====
function startGame(){
  if(!S.players.length){toast('Ajoute au moins 1 joueur.');return}
  S.started=true;S.idx=0;S.usedT=[];S.usedD=[];S.history=[];S.lastT=null;S.lastD=null;
  D.scHome.classList.remove('active');D.scGame.classList.add('active');
  renderHist();updateUI()
}

function updateUI(){
  const p=S.players[S.idx];
  D.playerName.textContent=p?esc(p):'―';
  D.roundInfo.textContent=`Joueur ${S.idx+1}/${S.players.length}`;
  D.modeBadge.textContent=S.cat.charAt(0).toUpperCase()+S.cat.slice(1);
  D.btnT.disabled=false;D.btnD.disabled=false;
  D.cardLabel.textContent='Choisis Vérité ou Action';
  D.cardText.textContent='Appuie sur un bouton';
  D.cardText.className='card-text empty';
  D.card.classList.remove('pop');
  D.ansArea.classList.add('hide');
  D.ansShow.classList.add('hide');
  D.shareBar.classList.add('hide');
  D.nextBar.classList.add('hide');
}

function handleChoice(type){
  if(!S.started||!S.players.length)return;
  D.btnT.disabled=true;D.btnD.disabled=true;
  showTension(type,()=>{
    const q=pick(S.cat,type);const isT=type==='truth';
    D.cardLabel.textContent=isT?'☯ Vérité':'⚡ Action';
    D.cardText.textContent=q;D.cardText.className='card-text '+(isT?'t':'d');
    D.card.classList.remove('pop');void D.card.offsetWidth;D.card.classList.add('pop');
    S.history.push({type,player:S.players[S.idx],text:q,cat:S.cat});
    renderHist();
    if(isT){D.ansArea.classList.remove('hide');D.ansInp.value='';D.ansInp.focus()}
    D.shareBar.classList.remove('hide');
    D.nextBar.classList.remove('hide');
    if(S.mode==='solo')setTimeout(nextPlayer,4000)
  })
}

function submitAns(){
  const a=D.ansInp.value.trim();
  if(!a){toast('Écris ta réponse.');return}
  const h=S.history[S.history.length-1];
  if(h&&!h.answer)h.answer=a;
  D.ansTxt.textContent=a;D.ansArea.classList.add('hide');D.ansShow.classList.remove('hide');
  renderHist();toast('✅ Réponse enregistrée')
}

function nextPlayer(){
  if(!S.players.length)return;
  S.idx=(S.idx+1)%S.players.length;
  D.ansArea.classList.add('hide');D.ansShow.classList.add('hide');
  updateUI()
}

function resetGame(){
  S.started=false;S.history=[];
  D.scGame.classList.remove('active');D.scHome.classList.add('active');
  renderHist();toast('↺ Partie réinitialisée')
}

// ===== TENSION =====
function showTension(type,cb){
  const ov=D.overlay,fl=D.ovFill,cn=D.ovCnt,lb=D.ovLbl;
  lb.textContent=type==='truth'?'☯ Vérité...':'⚡ Action...';
  cn.textContent='';fl.style.width='0%';ov.classList.add('active');
  const dur=1600;const start=Date.now();let lastSec=4;cn.textContent='3';
  function tick(){
    const e=Date.now()-start,p=Math.min(e/dur,1);
    fl.style.width=(p*100)+'%';
    const sec=Math.max(Math.ceil((dur-e)/1000),1);
    if(sec!==lastSec){lastSec=sec;cn.textContent=sec;cn.style.animation='none';void cn.offsetWidth;cn.style.animation='pulse .5s'}
    if(p<1)requestAnimationFrame(tick);
    else{cn.textContent='GO!';setTimeout(()=>{ov.classList.remove('active');cb()},350)}
  }
  tick()
}

// ===== SHARE =====
function shareWa(){
  const t=D.cardText.textContent,lb=D.cardLabel.textContent,p=D.playerName.textContent;
  if(!t||t==='Appuie sur un bouton'||t==='―'){toast('Tire une question d\'abord !');return}
  const a = D.ansTxt.textContent&&!D.ansShow.classList.contains('hide')?`\n💬 Réponse : ${D.ansTxt.textContent}`:'';
  const msg=encodeURIComponent(
    `🎮 *Action ou Vérité*\n👤 *${p}*\n${lb}\n❓ ${t}${a}\n\n📱 Rejoins la partie : ${gameUrl}`
  );
  window.open(`https://wa.me/?text=${msg}`,'_blank');toast('💬 WhatsApp ouvert !')
}

function shareCp(){
  const t=D.cardText.textContent,lb=D.cardLabel.textContent,p=D.playerName.textContent;
  if(!t||t==='Appuie sur un bouton'||t==='―'){toast('Tire une question d\'abord !');return}
  const a = D.ansTxt.textContent&&!D.ansShow.classList.contains('hide')?`\n💬 Réponse : ${D.ansTxt.textContent}`:'';
  const msg=`🎮 Action ou Vérité\n👤 ${p}\n${lb}\n❓ ${t}${a}\n\n📱 Rejoins la partie : ${gameUrl}`;
  if(navigator.clipboard) navigator.clipboard.writeText(msg).then(()=>toast('📋 Copié !'));
  else prompt('Copie ce message :',msg)
}

function shareHomeWa(){
  const msg=encodeURIComponent(`🎮 *Action ou Vérité*\nViens jouer avec moi !\n${gameUrl}`);
  window.open(`https://wa.me/?text=${msg}`,'_blank')
}
function shareHomeCp(){
  if(navigator.clipboard)navigator.clipboard.writeText(gameUrl).then(()=>toast('🔗 Lien copié !'));
  else prompt('Copie le lien :',gameUrl)
}

// ===== HISTORY =====
function renderHist(){
  if(!S.history.length){D.histList.innerHTML='<span style="color:var(--dim);font-size:.7rem;">Aucun tour</span>';return}
  D.histList.innerHTML=S.history.slice().reverse().map(h=>{
    const b=h.type==='truth'?'t':'d';
    const a=h.answer?`<span class="a">→ ${esc(h.answer)}</span>`:'';
    return `<div class="hist-item"><span class="b ${b}">${h.type==='truth'?'V':'A'}</span><span class="p">${esc(h.player)}</span><span class="t">${esc(h.text)}${a}</span></div>`
  }).join('')
}

// ===== EVENTS =====
D.btnAdd.addEventListener('click',addPlayer);
D.inpName.addEventListener('keydown',e=>{if(e.key==='Enter')addPlayer()});

D.modePills.querySelectorAll('.pill').forEach(p=>{
  p.addEventListener('click',()=>{
    D.modePills.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');S.mode=p.dataset.v
  })
});
D.catPills.querySelectorAll('.pill').forEach(p=>{
  p.addEventListener('click',()=>{
    D.catPills.querySelectorAll('.pill').forEach(x=>x.classList.remove('active'));
    p.classList.add('active');S.cat=p.dataset.v;S.usedT=[];S.usedD=[];S.lastT=null;S.lastD=null
  })
});
D.btnStart.addEventListener('click',startGame);
D.btnHomeWa.addEventListener('click',shareHomeWa);
D.btnHomeCopy.addEventListener('click',shareHomeCp);
D.btnQuit.addEventListener('click',resetGame);
D.btnT.addEventListener('click',()=>handleChoice('truth'));
D.btnD.addEventListener('click',()=>handleChoice('dare'));
D.btnAns.addEventListener('click',submitAns);
D.ansInp.addEventListener('keydown',e=>{if(e.key==='Enter')submitAns()});
D.btnNext.addEventListener('click',nextPlayer);
D.btnReset.addEventListener('click',resetGame);
D.btnClearHist.addEventListener('click',()=>{S.history=[];renderHist();toast('🗑️ Effacé')});
D.btnShareWa.addEventListener('click',shareWa);
D.btnShareCp.addEventListener('click',shareCp);

// ===== KEYBOARD =====
document.addEventListener('keydown',e=>{
  if(!S.started)return
  if(e.key==='t'||e.key==='1'){e.preventDefault();D.btnT.click()}
  if(e.key==='d'||e.key==='2'){e.preventDefault();D.btnD.click()}
  if(e.key==='n'||e.key==='ArrowRight'){e.preventDefault();D.btnNext.click()}
  if(e.key==='Escape')resetGame()
});

// ===== INIT =====
renderChips();
console.log('🎮 Action ou Vérité WhatsApp prêt !')
